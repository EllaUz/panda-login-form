<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Form</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <div id="overall">
        <div id="panda">
            <div id="leftEar">
                <div id="inner"></div>
            </div>
            <div id="rightEar">
                <div id="inner"></div>
            </div>
            <div id="head">
                <div id="leftEye">
                    <div id="blackPart">
                        <div id="whitePart"></div>
                    </div>
                </div>
                <div id="rightEye">
                    <div id="blackPart">
                        <div id="whitePart"></div>
                    </div>
                </div>
                <div id="nose">
                    <div id="line1"></div>
                    <div id="line2"></div>
                </div>
                <div id="mouth">
                    <div id="tongue"></div>
                </div>
            </div>

            <div id="body">
                <div id="lefthand"></div>
                <div id="righthand"></div>

                <div id="leftleg">
                    <div id="dot1"></div>
                    <div id="dot2"></div>
                    <div id="dot3"></div>
                    <div id="dot4"></div>
                </div>
                <div id="rightleg">
                    <div id="dot1"></div>
                    <div id="dot2"></div>
                    <div id="dot3"></div>
                    <div id="dot4"></div>
                </div>
            </div>

            <form >
                <h1>sign in</h1>

                <label for="">username</label>
                <input type="text">

                <label for="">password</label>
                <input type="password" >

                <button>login</button>
            </form>
        </div>
    </div>
</body>
</html>
